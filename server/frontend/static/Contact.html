<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us</title>
  <link rel="stylesheet" href="/static/css/bootstrap.min.css" />
  <link rel="stylesheet" href="/static/css/styles.css" />
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="/">Cars Dealership</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="/">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/about">About Us</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="/contact">Contact Us</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <section class="container py-5">
    <div class="row align-items-center">
      <div class="col-md-6">
        <img src="/static/images/contact-us.jpg" class="img-fluid rounded" alt="Contact Cars Dealership">
      </div>
      <div class="col-md-6">
        <h1>Contact Us</h1>
        <p>We are here to help you with dealership locations, services, and reviews.</p>
        <p><strong>Email:</strong> support@carsdealership.com</p>
        <p><strong>Phone:</strong> +1 555 123 4567</p>
        <p><strong>Address:</strong> 123 Main Street, Kansas City, KS, USA</p>
      </div>
    </div>

    <div class="row mt-5">
      <div class="col-md-8">
        <form>
          <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" class="form-control" placeholder="Enter your name">
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" placeholder="Enter your email">
          </div>
          <div class="mb-3">
            <label class="form-label">Message</label>
            <textarea class="form-control" rows="5" placeholder="Write your message"></textarea>
          </div>
          <button type="submit" class="btn btn-primary">Send Message</button>
        </form>
      </div>
    </div>
  </section>

  <script src="/static/js/bootstrap.bundle.min.js"></script>
</body>
</html>
